services:
  brain-server:
    build:
      context: ../brain-server
      dockerfile: Dockerfile
      args:
        BUILD_STAMP: ${BUILD_STAMP:-dev}
    container_name: ai4kb-brain-server
    restart: unless-stopped
    ports:
      - "8091:8091"
    env_file:
      - ../.env.brain
    environment:
      - NODE_ENV=production
      - PORT=8091
      - DATABASE_URL=postgresql://postgres:postgres@brain-postgres:5432/ai4kb_brain
      - REDIS_URL=redis://brain-redis:6379
      - MONGO_URL=mongodb://brain-mongo:27017
      - MONGO_DB_NAME=ai4kb_brain
      - SKILL_INPUT_BASE_DIR=/shared/brain-skill-files/inputs
      - SKILL_OUTPUT_BASE_DIR=/shared/brain-skill-files/outputs
      - SKILL_INDICATOR_SCRIPT_PATH=/opt/skills/cad_text_extractor/run_skill.py
      - BRAIN_SERVICE_URL=http://host.docker.internal:3100
    depends_on:
      brain-postgres:
        condition: service_healthy
      brain-redis:
        condition: service_started
      brain-mongo:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../skills/cad_text_extractor:/opt/skills/cad_text_extractor:ro
      - brain_skill_files:/shared/brain-skill-files
    networks:
      - ai4kb-brain-net

  brain:
    build:
      context: ..
      dockerfile: deploy/Dockerfile-brain
      args:
        BUILD_STAMP: ${BUILD_STAMP:-dev}
    container_name: ai4kb-brain
    restart: unless-stopped
    network_mode: host
    volumes:
      - ../skills:/opt/skills:ro
      - brain_skill_files:/shared/brain-skill-files
    env_file:
      - ../.env.brain
    environment:
      - NODE_ENV=production
      - PORT=3100
      - BRAIN_SERVER_BASE_URL=http://localhost:8091
      - OPENAI_BASE_URL=http://localhost:11434/v1
      - ANTHROPIC_BASE_URL=http://localhost:11434/v1
      - ANTHROPIC_MODEL=qwen3.5:9b
      - CLAUDE_CODE_COMPATIBLE_API_PROVIDER=openai
      - CLAUDE_CODE_SIMPLE=0
      - ANTHROPIC_API_KEY=ollama
      - CLOAI_API_KEY=ollama-dummy
      - SKILL_INPUT_BASE_DIR=/shared/brain-skill-files/inputs
      - SKILL_OUTPUT_BASE_DIR=/shared/brain-skill-files/outputs
      # qwen3.5 模型 thinking 内容可能长达 8K-20K tokens，需要更大的 output budget
      # 当前 thinking 模式会把 context 填满，导致 content 被截断
      # 此参数确保 total output（包括 thinking + content）有足够空间
      - CLAUDE_CODE_MAX_OUTPUT_TOKENS=20000

  brain-maintenance:
    image: deploy-brain-server
    container_name: ai4kb-brain-maintenance
    restart: unless-stopped
    profiles: ["maintenance"]
    env_file:
      - ../.env.brain
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@brain-postgres:5432/ai4kb_brain
      - REDIS_URL=redis://brain-redis:6379
      - BRAIN_BASE_URL=http://brain-server:8091
    depends_on:
      brain-postgres:
        condition: service_healthy
      brain-redis:
        condition: service_started
      brain-server:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - /bin/sh
      - -lc
      - |
        INTERVAL="$${MAINTENANCE_INTERVAL_SECONDS:-1800}"
        ENABLE_SMOKE="$${MAINTENANCE_ENABLE_SMOKE:-true}"
        while true; do
          bun dist/scripts/maintenanceTick.js || echo "[ALERT] maintenance tick failed"
          if [ "$$ENABLE_SMOKE" = "true" ]; then
            bun dist/scripts/smokeAdminFileStatusApis.js || echo "[ALERT] smoke-admin-file-status failed"
          fi
          sleep "$$INTERVAL"
        done
    networks:
      - ai4kb-brain-net

  brain-postgres:
    image: postgres:15-alpine
    pull_policy: if_not_present
    container_name: ai4kb-brain-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=ai4kb_brain
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai4kb_brain"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - brain_postgres_data:/var/lib/postgresql/data
    networks:
      - ai4kb-brain-net

  brain-mongo:
    image: mongo:7
    pull_policy: if_not_present
    container_name: ai4kb-brain-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_DATABASE=ai4kb_brain
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - brain_mongo_data:/data/db
    networks:
      - ai4kb-brain-net

  brain-redis:
    image: valkey/valkey:8
    pull_policy: if_not_present
    container_name: ai4kb-brain-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: ["valkey-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - brain_redis_data:/data
    networks:
      - ai4kb-brain-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ai4kb-frontend
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://brain-server:8091
    ports:
      - "8086:80"
    depends_on:
      brain-server:
        condition: service_started
    networks:
      - ai4kb-brain-net

  # 前端开发模式（Vite 热更新）
  frontend-dev:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: ai4kb-frontend-dev
    restart: unless-stopped
    profiles: ["dev"]  # 仅在使用 --profile dev 时启动
    ports:
      - "8087:3000"  # 使用 8087 端口避免与生产前端冲突
    environment:
      - VITE_DEV_PORT=3000
      - VITE_BACKEND_URL=http://brain-server:8091
    volumes:
      - ../frontend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      brain-server:
        condition: service_started
    networks:
      - ai4kb-brain-net

  ollama-local:
    image: ollama/ollama:latest
    container_name: ollama-local
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_MODELS=/root/.ollama/models
      # OLLAMA_DISABLE_THINKING: qwen3.5 模型默认开启 thinking，会导致 context 膨胀后卡死，强烈建议保持为 true
      - OLLAMA_DISABLE_THINKING=true
      # 模型保活时间（默认5分钟，0为永久）
      - OLLAMA_KEEP_ALIVE=5m
      # 最大并发数（qwen3.5:9b 建议设为1，避免显存竞争）
      - OLLAMA_NUM_PARALLEL=1
      # 加载超时（模型较大时可调大）
      - OLLAMA_LOAD_TIMEOUT=5m0s
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  ai4kb-brain-net:
    driver: bridge

volumes:
  brain_postgres_data:
  brain_redis_data:
  brain_mongo_data:
  brain_skill_files:
  brain_output_files:
  ollama_data:
    external: true
